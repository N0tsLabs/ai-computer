<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <title>screenpilot overlay</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Edge glow: a hairline perimeter band -->
  <div class="edge edge--top"></div>
  <div class="edge edge--right"></div>
  <div class="edge edge--bottom"></div>
  <div class="edge edge--left"></div>

  <!-- Status pill -->
  <div class="pill" role="status" aria-live="polite">
    <span class="pill__dot"></span>
    <span class="pill__text" id="label">AI 接管中</span>
    <span class="pill__hint">· 按 Esc 收回控制</span>
  </div>

  <!-- Virtual cursor + transient ripples / trail are appended at runtime -->
  <div class="vcursor" id="vcursor" data-mode="idle">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Classic arrow with subtle stroke for visibility on bright + dark BGs -->
      <path d="M3 2 L3 17 L7.2 13.4 L9.6 19.5 L12.2 18.4 L9.8 12.3 L15.5 12 Z"
            fill="#ffffff" stroke="#1a2a40" stroke-width="1.1" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Event feed bottom-centre -->
  <div class="feed" id="feed"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
